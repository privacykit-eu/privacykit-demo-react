<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="index.css">
  <title>PrivacyKit React Demo</title>
</head>

<body>
  <noscript>This demo requires JavaScript to render the consent UI and run guarded scripts.</noscript>

  <consent-guard consent="preferences">
    <script type="text/plain">
        window.preferencesScript = {
          message: 'Preferences script loaded.',
        };
      </script>
  </consent-guard>
  <consent-guard consent="analytics">
    <script type="text/plain">
        window.analyticsScript = {
          message: 'Analytics script loaded.',
        };
      </script>
  </consent-guard>
  <consent-guard consent="marketing">
    <script type="text/plain">
        window.marketingScript = {
          message: 'Marketing script loaded.',
        };
      </script>
  </consent-guard>

  <!-- Add consent-guard(s) to block/load 3rd party scripts -->
  <consent-guard consent="analytics">
    <script type="text/plain" data-src="https://www.googletagmanager.com/gtag/js?id=AW-18125352831"></script>
  </consent-guard>

  <!-- Add consent-dialog -->
  <consent-dialog variant="modern" show-fab google-consent-mode>
    <img slot="dialog-logo-top" width="200px" src="/logo.png" alt="Company logo" />
  </consent-dialog>

  <!-- Add compliance-monitor for continuous compliance monitoring & validation -->
  <compliance-monitor></compliance-monitor>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
